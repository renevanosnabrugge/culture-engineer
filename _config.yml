title: René van Osnabrugge
description: Technology & Transformation Executive | Consulting Director | Speaker  | Microsoft MVP — Most technology problems are culture problems in disguise
url: "https://culture-engineers.nl"
baseurl: ""

author:
  name: René van Osnabrugge
  title: Technology & Transformation Executive
  email: rvanosnabrugge@live.com
  linkedin: https://www.linkedin.com/in/renevanosnabrugge
  github: https://github.com/renevanosnabrugge
  bio: >
    A technology executive with 25+ years of experience helping complex organizations
    become sharper, faster and more effective, while moving the people inside them
    along the way. Global Consulting Director at Xebia · Microsoft Services (Xpirit),
    Microsoft MVP since 2012, founder of the Global DevOps Bootcamp, and international
    speaker on 50+ stages.
  photo: /assets/images/profile.jpg

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

# jekyll-seo-tag: used for canonical URLs, Open Graph, Twitter Cards, JSON-LD
# Falls back to this photo as the shared social-preview image (og:image) for
# any page/post that doesn't set its own `image:` front matter.
logo: /assets/images/culture-engineers-ph.png

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  presentations:
    output: false
  publications:
    output: false
  books:
    output: true
    permalink: /inspiration/books/:name/
  models:
    output: true
    permalink: /inspiration/models/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: /assets/images/culture-engineers-ph.png
      published: true
  - scope:
      path: "pages"
    values:
      layout: "page"
  - scope:
      type: "books"
    values:
      published: true
  - scope:
      type: "models"
    values:
      published: true
      image: /assets/images/culture-engineers-ph.png

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - README.md
  - _config.development.yml
  # Clarity analytics — never build into the public site
  - local-dashboard
  - data/clarity-history
