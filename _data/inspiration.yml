# ── Books ─────────────────────────────────────────────────

# Change & Growth
- title: "ADKAR: A Model for Change in Business, Government and Our Community"
  author: "Jeffrey M. Hiatt"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1930885504"
  review: >
    Organizations don't change — people do, one at a time. ADKAR gives leaders a five-step
    model (Awareness, Desire, Knowledge, Ability, Reinforcement) for guiding individuals
    through change. Most initiatives fail because they skip the human side entirely.

- title: "Who Moved My Cheese?"
  author: "Spencer Johnson"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/0743582853"
  review: >
    A short parable about adapting to change. When the cheese disappears, some adapt quickly
    and some resist. Clinging to what was is far more dangerous than moving toward what could be.

- title: "The Crossroads of Should and Must"
  author: "Elle Luna"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/1523303581"
  review: >
    A beautifully illustrated meditation on the life we feel obligated to live ("Should")
    versus the life we feel called to live ("Must"). Choosing "Must" is the only path to a
    truly fulfilling life, even when it comes with real risk.

- title: "The Mountain Is You"
  author: "Brianna Wiest"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/1949759229"
  review: >
    Self-sabotage isn't self-destruction — it's self-protection. Wiest helps readers understand
    the emotional roots of getting in their own way, offering a path to self-mastery grounded
    in self-awareness rather than willpower.

# Mindset & Psychology
- title: "Mindset: The New Psychology of Success"
  author: "Carol S. Dweck"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/0345472322"
  review: >
    The single belief you hold about whether your abilities are fixed or capable of growth
    shapes nearly everything. Dweck's research-backed framework distinguishes a fixed mindset
    from a growth mindset — cultivating the latter unlocks potential that a fixed mindset
    silently forecloses.

- title: "The Catalyst: How to Change Anyone's Mind"
  author: "Jonah Berger"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1982147704"
  review: >
    Pushing harder rarely changes minds. Catalysts remove the barriers preventing people from
    changing themselves. Berger's REDUCE framework identifies five key barriers and offers
    practical tactics to overcome each one.

# Leadership
- title: "Dare to Lead"
  author: "Brené Brown"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/0399592520"
  review: >
    Vulnerability is not weakness — it's the most accurate predictor of courageous leadership.
    Daring leaders choose to be seen, embrace uncertainty, and have the difficult conversations
    that matter.

- title: "Start with Why"
  author: "Simon Sinek"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1591846447"
  review: >
    Great leaders communicate from the inside out — starting with why they do what they do.
    Sinek's Golden Circle shows that purpose and belief inspire action where features and
    benefits don't. People don't buy what you do; they buy why you do it.

- title: "The Infinite Game"
  author: "Simon Sinek"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/073521350X"
  review: >
    Business is an infinite game — there's no final score, no declared winner. Yet most leaders
    play it like a finite one. Truly great leaders have a Just Cause, build trusting teams,
    and always prioritize staying in the game over "winning" it.

- title: "The Motive"
  author: "Patrick Lencioni"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/1119600243"
  review: >
    There are two reasons people want to lead: the rewards it brings, or the responsibility it
    carries. Leaders driven by reward quietly abdicate the hard work of serving their people.
    A short, uncomfortable fable that exposes the hidden root cause of leadership failure.

- title: "Coach to Coach"
  author: "Martin Rooney"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/173382742X"
  review: >
    Great coaches focus on developing people, not just performance. The best coaches produce
    great human beings first, and high performers second. Applies equally to management,
    parenting, and mentorship.

# Teams & Culture
- title: "High Ten: Building Great Team Culture"
  author: "Martin Rooney"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/B09BCZS3NF"
  review: >
    Culture isn't what happens by accident — it's what leaders build deliberately. Rooney
    gives leaders a practical system to create the kind of team people are genuinely proud
    to be part of.

- title: "No Rules Rules: Netflix and the Culture of Reinvention"
  author: "Reed Hastings & Erin Meyer"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1984877860"
  review: >
    Netflix removed rules rather than adding them — hire only exceptional people, build radical
    transparency, then extend extraordinary freedom. The result is a culture of high-performing
    adults who don't need to be managed, just trusted.

- title: "Powerful: Building a Culture of Freedom and Responsibility"
  author: "Patty McCord"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1939714095"
  review: >
    Most HR practices were built to manage compliance, not build great teams. McCord, who
    co-created the Netflix Culture Deck, argues for treating employees like fully capable
    adults: tell them the truth, give them real responsibility, and let go.

- title: "The 6 Types of Working Genius"
  author: "Patrick Lencioni"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/1637745680"
  review: >
    Workplace unhappiness usually isn't a character flaw — it's a mismatch between the work
    you're doing and the type of work you're wired for. Understanding your own wiring and
    your team's wiring changes everything.

- title: "The Five Dysfunctions of a Team"
  author: "Patrick Lencioni"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/0787960756"
  review: >
    Absence of trust leads to fear of conflict, which leads to lack of commitment, avoidance
    of accountability, and ultimately inattention to results. Lencioni's five-layer model
    explains why so many technically capable teams still fail to deliver — and what leaders
    can actually do about it.

- title: "The Culture Map"
  author: "Erin Meyer"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1610392507"
  review: >
    Cross-cultural friction rarely comes from bad values — it comes from invisible differences
    in norms around communication, feedback, hierarchy, and decision-making. Meyer's
    eight-scale framework helps global teams decode why their interactions keep going wrong.

# Operations & Technology
- title: "The Goal: A Process of Ongoing Improvement"
  author: "Eliyahu M. Goldratt & Jeff Cox"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/0884271951"
  review: >
    Every system has exactly one constraint that limits its total output. Through a business
    novel about a factory manager, Goldratt's Theory of Constraints turns conventional thinking
    about efficiency and productivity on its head.

- title: "The Phoenix Project"
  author: "Gene Kim, Kevin Behr & George Spafford"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/1942788290"
  review: >
    IT work behaves exactly like a factory floor — it has flow, bottlenecks, and invisible
    work-in-process. This business novel shows how a failing IT department transforms by
    understanding the Three Ways: flow, feedback, and continuous learning.

- title: "The Unicorn Project"
  author: "Gene Kim"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/1942788762"
  review: >
    The companion to The Phoenix Project, told from a developer's perspective. Kim's Five
    Ideals — Locality and Simplicity, Focus and Flow, Improvement of Daily Work, Psychological
    Safety, and Customer Focus — describe what separates great engineering organizations.

# Negotiation & Communication
- title: "Never Split the Difference"
  author: "Chris Voss"
  type: book
  rating: 5
  url: "https://www.amazon.com/dp/0062407805"
  review: >
    Former FBI hostage negotiator Voss argues that real negotiation is about emotion, not
    logic. Tactics like tactical empathy, calibrated questions, and mirroring are far more
    effective than rational compromise. Every negotiation is a conversation about feelings.

# Health
- title: "How Not to Die"
  author: "Michael Greger, MD"
  type: book
  rating: 4
  url: "https://www.amazon.com/dp/1250066115"
  review: >
    The leading causes of death in the developed world are largely preventable. Greger argues
    that whole plant foods, daily movement, and good sleep address the vast majority of chronic
    disease risk. Evidence-based, practical, and occasionally uncomfortable.

# ── Blogs ─────────────────────────────────────────────────

- title: "Martin Fowler's Blog"
  author: "Martin Fowler"
  type: blog
  url: "https://martinfowler.com"
  review: >
    Timeless writing on software design, architecture, and process. Fowler's articles on
    microservices, CI/CD, and refactoring have shaped how an entire generation of developers
    thinks about building software.

- title: "LeadDev"
  author: "Various Contributors"
  type: blog
  url: "https://leaddev.com"
  review: >
    The best resource I know for engineering leadership content. Covers people management,
    technical strategy, career development, and engineering culture in equal measure.

- title: "The New Stack"
  author: "Various Contributors"
  type: blog
  url: "https://thenewstack.io"
  review: >
    Excellent coverage of cloud-native technologies, platform engineering, and the evolving
    infrastructure landscape. A reliable source for staying current on industry trends.

- title: "How Great Leaders Inspire Action"
  author: "Simon Sinek"
  type: video
  url: "https://www.ted.com/talks/simon_sinek_how_great_leaders_inspire_action"
  review: >
    The famous 'Start With Why' TED Talk. Sinek's Golden Circle model applies just as well
    to building engineering teams and products as it does to marketing. A must-watch for
    anyone in a leadership role.

- title: "The Power of Vulnerability"
  author: "Brené Brown"
  type: video
  url: "https://www.ted.com/talks/brene_brown_the_power_of_vulnerability"
  review: >
    Brown's research on vulnerability and shame underpins much of what I believe about
    psychological safety in teams. If you want engineers to take risks and learn, you first
    need to build an environment where vulnerability is safe.

- title: "Continuous Delivery with Dave Farley"
  author: "Dave Farley"
  type: video
  url: "https://www.youtube.com/@ContinuousDelivery"
  review: >
    Farley's YouTube channel is an outstanding free resource on Continuous Delivery,
    software engineering, and the technical practices that enable rapid, reliable releases.
