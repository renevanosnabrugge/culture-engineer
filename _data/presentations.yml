- title: "Mind Matters: The Importance of Cultivating a DevOps Mindset"
  event: "Live! 360 Tech Con Orlando 2023"
  location: "Orlando, FL, USA"
  date: "2023-11-12"
  year: 2023
  upcoming: false
  url: "https://live360events.com/"
  description: >
    While hard skills like continuous delivery and automated testing are important for
    practicing DevOps successfully, they are not the only factors that determine success.
    People's mindset and willingness to embrace new practices and tools can also play a
    critical role. In this session, we explore the concept of a DevOps mindset and how to
    cultivate it within yourself and your team, discussing how to recognize fears and
    counter-productive behavior, and how to foster a culture of courage, teamwork,
    DevOps leadership, and continuous improvement.

