# ── 2022 ──────────────────────────────────────────────────

- title: "When 'We are down' is not good enough. Site Reliability Engineering (SRE) in Azure"
  event: "CloudBrew 2022"
  location: "Mechelen, Belgium"
  date: "2022-11-18"
  year: 2022
  upcoming: false
  url: "https://www.cloudbrew.be/"
  description: >
    The more we are connected and the more others are connected to us, the more important
    reliability of your sites becomes. Site Reliability Engineering is an engineering
    discipline devoted to helping an organization sustainably achieve the appropriate level
    of reliability in their systems, services, and products. In this session we cover the
    concepts of SRE and use Microsoft Azure to implement some of the concepts and practices.
    Key takeaways: what SRE is and why you should use it, what an SLA, SLO and SLI are,
    and the difference between DevOps and SRE.

