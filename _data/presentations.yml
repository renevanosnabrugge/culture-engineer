- title: "Culture Club: Building a Strong Engineering Culture from the Ground Up"
  event: "Visual Studio Live! Las Vegas 2024"
  location: "Las Vegas, NV, USA"
  date: "2024-03-03"
  year: 2024
  upcoming: false
  url: "https://vslive.com/"
  description: >
    Every company is essentially a software company in today's digital world. However,
    building and delivering great software is not enough to ensure success. To truly
    thrive, companies must embrace an engineering culture that goes beyond technical
    solutions. In this session, we explore the 8 pillars of an engineering culture and
    show you how to build and nurture one that drives business success — from state-of-the-art
    software and smooth delivery, to appropriate continuity, the power of platforms, and
    empowering leadership.

