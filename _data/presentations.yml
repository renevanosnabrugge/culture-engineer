- title: "The Fin-tastic Way to Boost Your Cloud ROI: An Introduction to FinOps on Azure"
  event: "Techorama Belgium 2024"
  location: "Antwerp, Belgium"
  date: "2024-05-07"
  year: 2024
  upcoming: false
  url: "https://techorama.be/"
  slides: "https://speakerdeck.com/renevanosnabrugge/fintastic-finops-azure-techorama-be-2024"
  description: >
    Are you tired of overspending on cloud costs? Want to optimize your Azure spending
    and boost your ROI? Look no further than FinOps! In this session, we dive into the
    basics of FinOps and why it is becoming increasingly important for organizations of
    all sizes. We explore the specific tools and features available on the Azure platform
    that can help you implement FinOps successfully, including cost management, budgeting,
    and optimization tools. Whether you are new to FinOps or have experience in the field,
    this session will provide valuable insights and practical tips for maximizing your
    cloud savings.

