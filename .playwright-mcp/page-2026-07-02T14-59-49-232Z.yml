                - heading "Description" [level=4] [ref=f8e115]
                - paragraph [ref=f8e116]:
                  - text: "Sooner or later, you will encounter the question: Rebuild or Refactor? Software that has been in use for several years will inevitably cause issues. Maybe the software is hard to maintain, or perhaps it is difficult to add new features, which slows down development. Your development teams might spend more time fixing issues than adding new features, making changes both hard and expensive. Developers may suggest starting over because the software is unmaintainable, while the business pushes back to maintain velocity."
                  - text: "Regardless of the reason, the question will arise: Should we rebuild the software? How long will it take? And how much will it cost?"
                  - text: These are important and seemingly straightforward questions, but the answers are not always simple or concrete. There is more to consider than just time and resources.
                  - text: In this session, we will explore this question in more detail. We will discuss some challenges and considerations involved in making the business decision to rebuild or refactor an application. Furthermore, we will explore how to proceed once the decision has been made.
                - heading "Submitted" [level=4] [ref=f8e117]
                - paragraph [ref=f8e118]: 18 Nov 2025 2:34 pm
