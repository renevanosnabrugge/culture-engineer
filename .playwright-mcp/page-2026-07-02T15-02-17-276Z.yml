              - generic [ref=f28e134]: "René is a DevOps Strategy Consultant working for Xpirit in the Netherlands. Using modern technologies, implementing Continuous Delivery, DevOps practices and coaching in the domain of Scrum and Agile, he helps companies improve their software delivery process. René is an active blogger and speaker at both national and international conferences where he shares his knowledge of his passion: DevOps and Application Lifecycle Management. René is a Microsoft MVP since 2012 and founder of the popular community event Global DevOps Bootcamp."
