                - heading "Learning Experience - DevOps Engineer for a day" [level=3] [ref=f28e106]
              - generic [ref=f28e107]:
                - heading "Description" [level=4] [ref=f28e108]
                - paragraph [ref=f28e109]:
                  - text: "In this 1 day workshop we give you the opportunity to be a true DevOps engineer for a day! The theme of the day is:"
                  - text: "\"You build it, you run it\""
                  - text: During the day you and your team will be responsible to keep a webshop up and running. Of course, this will not be easy. In a gamified simulation you will face a number of challenges that will disrupt your site. You will work together to first detect the disruption on the web shop we provisioned for you. Next you respond with a quick fix to get your shop up and running again. After that you need to take the time to figure out a permanent solution to automatically recover or prevent the disruption from happening in the first place.
                  - text: You will be provided with a fully provisioned infrastructure in Azure, operation pipelines in Azure DevOps and a functional application. This way you can focus on the real work !
                  - text: You should come prepared with a laptop but most importantly curiosity and a mindset to learn and improve. We'll apply tool agnostic practices so regardless whether you develop in c#, deploy with Jenkins or operate with Kubernetes this will be a great day to get into DevOps and SRE.
