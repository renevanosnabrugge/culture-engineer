            - heading "René van Osnabrugge" [level=3] [ref=f14e146]:
              - strong [ref=f14e147]: René van Osnabrugge
            - paragraph [ref=f14e148]: CTO @ Xpirit
            - generic [ref=f14e149]:
              - text: As CTO of Xpirit Netherlands, Rene helps organizations and leadership teams build an engineering culture that allows them to build, deliver, and operate software in a secure and compliant way. With a focus on both the technical and cultural aspects of a company, Rene helps clients transform their work processes, operating model, and culture to become high-speed, innovative, and productive.
              - text: Rene is passionate about learning new technologies and exploring the cultural and people aspects of companies. He believes that by focusing on both technical implementation and cultural development, we can drive our industry forward. He loves sharing his knowledge and insights at conferences and training events.
              - text: As a frequently asked speaker at well-known industry events like Microsoft TechDays, Techorama, AllDayDevOps, NDC, and Visual Studio Live!, Rene is known for his expertise in Microsoft Azure, DevOps and DevOps Culture. In addition to being a Microsoft MVP since 2012, he is also the founder of the popular community event Global DevOps Bootcamp.
