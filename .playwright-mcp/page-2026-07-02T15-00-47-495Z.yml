              - 'heading "Culture Club: Building a Strong Engineering Culture from the Ground Up" [level=3] [ref=f14e105]'
            - generic [ref=f14e106]:
              - heading "Description" [level=4] [ref=f14e107]
              - paragraph [ref=f14e108]:
                - text: Every company is essentially a software company in today's digital world. However, building and delivering great software is not enough to ensure success. To truly thrive in the world of software, companies must embrace an engineering culture that goes beyond technical solutions and touches upon the deeper causes of organizational success.
                - text: In this session, we'll explore the 8 pillars of an engineering culture and show you how to build and nurture one that drives business success. From state of the art software and smooth delivery, to appropriate continuity and the power of platforms, we'll cover the key elements that make up an engineering culture. We'll also delve into the importance of an empowering operating model, moving beyond traditional IT, and leadership in building a successful engineering culture.
                - text: Join me in this session and learn how to build and nurture an engineering culture that drives business success!
