name: Create and Schedule Social Posts

on:
  # Daily scan at 08:00 UTC — picks up all "To be published" items without social sub-issues
  schedule:
    - cron: '0 8 * * *'

  # Manual: target a specific issue or re-scan all "To be published" items
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Content issue number (leave empty to scan all "To be published" items)'
        required: false
        type: string
      force:
        description: 'Re-process even if social sub-issues already exist'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  schedule-social-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Schedule social sub-issues
        shell: pwsh
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GH_PROJECT_TOKEN:  ${{ secrets.GH_PROJECT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Set by workflow_dispatch input
          ISSUE_NUMBER:      ${{ inputs.issue_number }}
          FORCE_SOCIAL:      ${{ inputs.force }}
        run: |
          $scriptArgs = @()
          if ($env:ISSUE_NUMBER -and $env:ISSUE_NUMBER -match '^\d+$') {
            $scriptArgs += '-IssueNumber'
            $scriptArgs += [int]$env:ISSUE_NUMBER
          }
          if ($env:FORCE_SOCIAL -eq 'true') { $scriptArgs += '-Force' }
          pwsh .github/scripts/New-SocialSubIssues.ps1 @scriptArgs
