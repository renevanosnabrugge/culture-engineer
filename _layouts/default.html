<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jekyll-seo-tag: emits <title>, meta description, canonical link,
       Open Graph, Twitter Card and JSON-LD structured data. Respects
       page.title, page.description/page.excerpt, page.image and
       page.canonical_url (used by cross-posted articles) automatically. -->
  {% seo %}
  {% feed_meta %}

  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">

  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xk5gdi38n4");
  </script>

  <!-- Cookie consent -> Clarity Consent Mode (consentv2 API).
       Since Oct 2025, Clarity requires an explicit consent signal for EEA/UK/CH
       visitors before it will set its own tracking cookies. Without this,
       every visit from those regions looks like a new anonymous user.
       Replays the stored decision on every page load, since Clarity's consent
       state resets with each fresh script load and does not persist on its own. -->
  <script>
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('ce_cookie_consent'); } catch (e) { /* ignore */ }

      function sendConsent(granted) {
        window.clarity('consentv2', {
          ad_Storage: granted ? 'granted' : 'denied',
          analytics_Storage: granted ? 'granted' : 'denied'
        });
      }

      if (stored === 'granted') {
        sendConsent(true);
      } else if (stored === 'denied') {
        sendConsent(false);
      }
      // If no stored decision yet, Clarity defaults to denied until the
      // banner buttons (wired in main.js) call sendConsent via a click.
    })();
  </script>

  <!-- Stable anonymous user ID for Clarity.
       Clarity's _clck cookie is frequently blocked by browser privacy settings
       (Safari ITP, Firefox ETP), which causes a new user ID on every page load.
       Using localStorage gives each browser a durable anonymous ID that survives
       page navigations without relying on cookies. The Identify API queues the
       call internally, so calling it right after the snippet is safe. -->
  <script>
    (function () {
      try {
        var key = 'ce_clarity_uid';
        var uid = localStorage.getItem(key);
        if (!uid) {
          // Generate a random ID once and persist it for this browser
          uid = 'anon-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          localStorage.setItem(key, uid);
        }
        window.clarity('identify', uid);
      } catch (e) {
        // Fail silently — localStorage may be blocked in private browsing
      }
    })();
  </script>
</head>
<body>
  {% include header.html %}

  <main class="main-content">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include cookie-consent.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
